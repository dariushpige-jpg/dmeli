name: Cleanup downloaded files

on:
  workflow_dispatch:
    inputs:
      path_to_delete:
        description: 'Relative path to delete (e.g., downloads/ or downloads/video.mp4)'
        required: true
        type: string
        default: 'downloads/'
      commit_message:
        description: 'Commit message for the deletion'
        required: false
        type: string
        default: 'Delete files via cleanup workflow'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Delete the specified path
        id: delete_step                    # ✅ ADD THIS ID
        run: |
          TARGET="${{ github.event.inputs.path_to_delete }}"
          if [ ! -e "$TARGET" ]; then
            echo "⚠️ Path does not exist: $TARGET"
            echo "deleted=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Deleting: $TARGET"
          rm -rf "$TARGET"
          echo "deleted=true" >> $GITHUB_OUTPUT

      - name: Commit and push deletion
        if: steps.delete_step.outputs.deleted == 'true'   # ✅ USE THE CORRECT ID
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "${{ github.event.inputs.commit_message }}"
          git push
